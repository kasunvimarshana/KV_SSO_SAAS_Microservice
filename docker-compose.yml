version: '3.8'

services:
  # Infrastructure Services
  mysql:
    image: mysql:8.0
    container_name: kv_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: auth_db
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - microservices_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    container_name: kv_postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: product_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - microservices_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kv_redis
    restart: unless-stopped
    command: redis-server --requirepass secret
    ports:
      - "6379:6379"
    networks:
      - microservices_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application Services
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: kv_auth_service
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:auth_service_app_key_32_chars_xx=
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: auth_db
      DB_USERNAME: root
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PASSWORD: secret
      JWT_SECRET: shared_jwt_secret_for_all_services_must_be_32_chars
      JWT_TTL: 1440
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    ports:
      - "8001:80"
    networks:
      - microservices_net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./auth-service:/var/www/html

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: kv_user_service
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:user_service_app_key_32_chars_xx=
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: user_db
      DB_USERNAME: root
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PASSWORD: secret
      JWT_SECRET: shared_jwt_secret_for_all_services_must_be_32_chars
      AUTH_SERVICE_URL: http://auth-service/api
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
    ports:
      - "8002:80"
    networks:
      - microservices_net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./user-service:/var/www/html

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: kv_product_service
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:product_service_app_key_32_chars=
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: product_db
      DB_USERNAME: postgres
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PASSWORD: secret
      JWT_SECRET: shared_jwt_secret_for_all_services_must_be_32_chars
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
    ports:
      - "8003:80"
    networks:
      - microservices_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./product-service:/var/www/html

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: kv_inventory_service
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:inventory_service_app_key_32_chars=
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: inventory_db
      DB_USERNAME: root
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PASSWORD: secret
      JWT_SECRET: shared_jwt_secret_for_all_services_must_be_32_chars
      PRODUCT_SERVICE_URL: http://product-service/api
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
    ports:
      - "8004:80"
    networks:
      - microservices_net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./inventory-service:/var/www/html

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: kv_order_service
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:order_service_app_key_32_chars_xx=
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: order_db
      DB_USERNAME: root
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PASSWORD: secret
      JWT_SECRET: shared_jwt_secret_for_all_services_must_be_32_chars
      PRODUCT_SERVICE_URL: http://product-service/api
      INVENTORY_SERVICE_URL: http://inventory-service/api
      USER_SERVICE_URL: http://user-service/api
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
    ports:
      - "8005:80"
    networks:
      - microservices_net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./order-service:/var/www/html

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: kv_api_gateway
    restart: unless-stopped
    ports:
      - "8000:80"
    networks:
      - microservices_net
    depends_on:
      - auth-service
      - user-service
      - product-service
      - inventory-service
      - order-service

volumes:
  mysql_data:
  postgres_data:

networks:
  microservices_net:
    driver: bridge
